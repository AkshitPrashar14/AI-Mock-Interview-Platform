# ==============================================================
#  Docker Compose — AI Mock Interview Platform
#  End-to-End Integration (Modules 17 & 18)
#
#  Services:
#    - postgres: Database
#    - backend: Spring Boot API
#    - frontend: Next.js Client
#    - speech-service: FastAPI + Faster Whisper
# ==============================================================

version: '3.8'

services:

  # ---- PostgreSQL 16 ----
  postgres:
    image: postgres:16-alpine
    container_name: interview-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-interviewdb}
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-interviewdb}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---- Backend (Spring Boot) ----
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: interview-backend
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - DB_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB:-interviewdb}
      - DB_USERNAME=${POSTGRES_USER:-postgres}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - SPEECH_SERVICE_URL=http://speech-service:8001
      - CORS_ALLOWED_ORIGINS=http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health | grep UP || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ---- Frontend (Next.js) ----
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
    container_name: interview-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8081/api/v1
    depends_on:
      - backend

  # ---- Speech Service (FastAPI + Faster Whisper) ----
  speech-service:
    build:
      context: ./speech-service
      dockerfile: Dockerfile
    container_name: interview-speech
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - WHISPER_MODEL_SIZE=base
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

# ---- Named Volumes ----
volumes:
  postgres_data:
    driver: local
