# ==============================================================================
#  AI Mock Interview Platform — Base Application Configuration
#  This file contains SHARED settings inherited by ALL profiles.
#  Profile-specific overrides live in application-dev.yml / application-prod.yml
# ==============================================================================

spring:
  application:
    name: ai-mock-interview-platform
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  websocket:
    message-size-limit: 65536       # 64 KB per STOMP message
    send-buffer-size-limit: 524288  # 512 KB outbound buffer

# --- Server ---
server:
  port: ${SERVER_PORT:8081}
  servlet:
    context-path: /

# --- Actuator ---
management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized
  info:
    env:
      enabled: true

info:
  app:
    name: AI Mock Interview Platform
    version: 1.0.0
    description: Audio-first AI mock interview and assessment platform

# --- OpenAPI / Swagger (base — can be overridden per profile) ---
springdoc:
  api-docs:
    path: /api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: alpha
    tags-sorter: alpha

# --- Logging pattern (applies to all profiles) ---
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{requestId}] %-5level %logger{36} - %msg%n"
  level:
    root: INFO

# --- Application JWT & CORS (profile-specific values override these) ---
app:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration-ms: 900000      # 15 minutes
    refresh-token-expiration-days: 7
    issuer: ai-mock-interview-platform
    audience: ai-mock-interview-clients
    token-version: 1
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
    allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
    allowed-headers: Authorization,Content-Type,X-Request-ID
    allow-credentials: true
    max-age: 3600

  # --- AI Provider (Module 5) ---
  ai:
    provider: ${AI_PRIMARY_PROVIDER:gemini}
    fallback-provider: ${AI_FALLBACK_PROVIDER:}
    gemini:
      api-key: ${GEMINI_API_KEY:}
      model: ${GEMINI_MODEL:gemini-1.5-flash}
      base-url: https://generativelanguage.googleapis.com/v1beta
      max-output-tokens: 2048
      temperature: 0.7
      top-p: 0.95
      timeout-seconds: 60
    open-router:
      api-key: ${OPENROUTER_API_KEY:}
      model: ${OPENROUTER_MODEL:openai/gpt-4o-mini}
      agent-models:
        INTERVIEW: ${OPENROUTER_INTERVIEW_MODEL:openai/gpt-oss-120b:free}
        TECHNICAL: ${OPENROUTER_TECHNICAL_MODEL:openai/gpt-oss-120b:free}
        ENGLISH: ${OPENROUTER_ENGLISH_MODEL:nvidia/nemotron-3-nano-30b-a3b:free}
        BEHAVIORAL: ${OPENROUTER_BEHAVIORAL_MODEL:nvidia/nemotron-3-nano-30b-a3b:free}
        REPORT: ${OPENROUTER_REPORT_MODEL:openai/gpt-oss-120b:free}
      base-url: https://openrouter.ai/api/v1
      timeout-seconds: 60

# --- Speech Service (Module 4) ---
speech:
  service:
    url: ${SPEECH_SERVICE_URL:http://localhost:8001}
    timeout-seconds: 30
    retry-max-attempts: 3
    retry-backoff-ms: 2000
    min-transcript-length: 10   # characters — shorter transcripts are marked INVALID

# --- WebSocket configuration moved to main spring block above ---

# --- Resilience4j (Module 4) ---
resilience4j:
  circuitbreaker:
    instances:
      speech-service:
        register-health-indicator: true
        sliding-window-size: 10
        minimum-number-of-calls: 5
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        wait-duration-in-open-state: 30s
        failure-rate-threshold: 50
        slow-call-rate-threshold: 80
        slow-call-duration-threshold: 25s
  retry:
    instances:
      speech-service:
        max-attempts: 3
        wait-duration: 2s
        retry-exceptions:
          - java.io.IOException
          - org.springframework.web.client.ResourceAccessException
