# ==============================================================================
#  AI Mock Interview Platform — Base Application Configuration
#  This file contains SHARED settings inherited by ALL profiles.
#  Profile-specific overrides live in application-dev.yml / application-prod.yml
# ==============================================================================

spring:
  application:
    name: ai-mock-interview-platform
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

# --- Server ---
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /

# --- Actuator ---
management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized
  info:
    env:
      enabled: true

info:
  app:
    name: AI Mock Interview Platform
    version: 1.0.0
    description: Audio-first AI mock interview and assessment platform

# --- OpenAPI / Swagger (base — can be overridden per profile) ---
springdoc:
  api-docs:
    path: /api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: alpha
    tags-sorter: alpha

# --- Logging pattern (applies to all profiles) ---
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{requestId}] %-5level %logger{36} - %msg%n"
  level:
    root: INFO
