# ==============================================================================
#  AI Mock Interview Platform — Development Profile
#  Active when: SPRING_PROFILES_ACTIVE=dev (default)
#
#  Default credentials are intentionally weak — local dev only.
#  NEVER use these defaults in staging or production.
# ==============================================================================

spring:

  # --- Database ---
  datasource:
    url:              ${DB_URL:jdbc:postgresql://localhost:5432/interviewdb}
    username:         ${DB_USERNAME:postgres}
    password:         ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: InterviewDevPool
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 30000

  # --- JPA / Hibernate ---
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 20

  # --- Flyway ---
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true
    out-of-order: false

# --- Logging ---
logging:
  level:
    com.interviewplatform: DEBUG
    org.springframework.web: DEBUG
    org.flywaydb: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE

# --- OpenAPI enabled in dev ---
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

# =============================================================================
# WARNING: This is a DEVELOPMENT-ONLY JWT secret.
# It is intentionally committed for developer convenience.
# NEVER use this secret in staging or production.
# Production must set: JWT_SECRET environment variable (min 256-bit key).
# =============================================================================
app:
  jwt:
    secret: ZGV2LW9ubHktc2VjcmV0LWtleS1mb3ItbG9jYWwtZGV2ZWxvcG1lbnQtb25seS0yNTZiaXQ=
  cors:
    allowed-origins: http://localhost:3000
