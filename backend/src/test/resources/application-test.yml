# ==============================================================================
#  Test profile — overrides for unit/integration tests
#  Uses H2 in-memory database so no Postgres instance is needed.
# ==============================================================================

spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  flyway:
    enabled: false           # DDL handled by Hibernate ddl-auto in test mode

app:
  jwt:
    secret: dGVzdC1zZWNyZXQta2V5LXRoYXQtaXMtYXQtbGVhc3QtMjU2LWJpdHMtbG9uZy1mb3ItdGVzdHMhISE=
    access-token-expiration-ms: 900000
    refresh-token-expiration-days: 7
    issuer: ai-mock-interview-platform
    audience: ai-mock-interview-clients
    token-version: 1

logging:
  level:
    root: WARN
    com.interviewplatform: INFO
